<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Changer le mot de passe • StageForMe</title>
  <meta name="description" content="Changement obligatoire du mot de passe à la première connexion sur StageForMe." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Aller au contenu</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="Retour à l'accueil StageForMe">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">StageForMe</span>
      </a>
      <nav class="nav">
        <a href="dashboard.html" class="pill">Dashboard</a>
      </nav>
    </div>
  </header>

  <main id="main" class="container page">
    <section class="card auth-card" aria-label="Changer le mot de passe">
      <h2>Changer le mot de passe</h2>
      <p class="muted">Première connexion : tu dois définir un nouveau mot de passe.</p>

      <form action="#" method="post" novalidate>
        <div class="field">
          <label for="current">Mot de passe actuel</label>
          <input id="current" name="current_password" type="password" required autocomplete="current-password" />
        </div>

        <div class="field">
          <label for="new">Nouveau mot de passe</label>
          <input id="new" name="new_password" type="password" required minlength="8" autocomplete="new-password" />
          <small class="hint">Minimum 8 caractères (idéal : 12 + chiffre + symbole).</small>
        </div>

        <div class="field">
          <label for="confirm">Confirmer le nouveau mot de passe</label>
          <input id="confirm" name="confirm_password" type="password" required minlength="8" autocomplete="new-password" />
        </div>

        <button class="btn-primary" type="submit" style="width:100%">Valider</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© StageForMe</span>
      <a class="link" href="mentions-legales.html">Mentions légales</a>
    </div>
  </footer>
</body>
</html>
