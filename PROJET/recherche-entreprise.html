<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rechercher une offre • StageForMe</title>
  <meta name="description" content="Création de comptes pilotes et étudiants par l'administrateur StageForMe." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="#" class="logo">StageForMe</a>
    <div class="nav-links">
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li class="active"><a href="recherche-entreprise.html">Recherche</a></li>
            <li><a href="mentions-legales.html">Mentions légales</a></li>
            <li><a href="login.html">Connexion</a></li>
        </ul>
    </div>
    <img src="assets/images/menu-btn.png" alt="menu hamburger" class="menu-hamburger">
</nav>

  <main id="main" class="container page search">
    <div class="page-head">
      <h1>Rechercher une offre</h1>
      <p class="muted">La vérité je sais pas quoi écrire c'est pas mon job ça</p>
    </div>

    <section class="card form-card" aria-label="Barre de recherche offre">
      <form action="#" method="post" novalidate>
        
        <div class="field">
          <label for="rechercher">Rechercher</label>
          <input id="email" name="email" type="email" required autocomplete="email" placeholder="ex: Stage ingénieur..." />
        </div>
        <div class="actions">
          <div class="radio-group">
            <input type="radio" id="étudiants" name="type" value="utilisateur">
            <label for="étudiants">Comptes</label>
            <input type="radio" id="offres" name="type" value="posts" checked>
            <label for="offres">Offres</label>
            <input type="radio" id="entreprises" name="type" value="entreprise">
            <label for="entreprises">Fiches entreprises</label>
          </div>
          <button type="reset" class="btn-primary">Effacer</button>
          <button class="btn-primary" type="submit">Rechercher</button>
        </div>
      </form>
    </section>
  </main>

    <div class="container footer-inner">
      <span>© StageForMe</span>
      <a class="link" href="mentions-legales.html">Mentions légales</a>
    </div>
<script src="assets/js/menu.js"></script>
</body>
</html>
