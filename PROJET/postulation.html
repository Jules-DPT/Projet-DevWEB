<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postuler à une offre - StageForMe</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo"></a>
        <div class="nav-links">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li class="active"><a href="recherche.html">Recherche</a></li>
                <li><a href="mentions-legales.html">Mentions légales</a></li>
                <li><a href="login.html">Connexion</a></li>
            </ul>
        </div>
        <img src="assets/images/menu-btn.png" alt="menu hamburger" class="menu-hamburger">
    </nav>
    <header class="header-minimal">
        <a href="offre.html" class="back-button" title="Retour à la recherche">
            <img src="assets/images/back-arrow.png" alt="Retour">
        </a>
    </header>
    <main class="container-offre">
        <section class="card form-card">
            <form action="#" method="POST" enctype="multipart/form-data">
                <div class="form-grid">
                    <div class="field">
                        <label for="cv">Curriculum Vitae (CV)</label>
                        <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" required>
                        <span class="hint">Format PDF de préférence</span>
                    </div>
                    <div class="field">
                        <label for="lm">Lettre de motivation</label>
                        <textarea class="post-textarea" type="text" id="lm" name="lm"> </textarea>
                        <span class="hint">Optionnel</span>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary">Envoyer ma candidature</button>
                </div>
            </form>
        </section>
    </main>


    <section class="board-footer">
        <span>© StageForMe</span>
        <a class="link" href="mentions-legales.html">Mentions légales</a>
    </section>
<script src="assets/js/menu.js"></script>
</body>
</html>
