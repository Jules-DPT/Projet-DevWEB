<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html lang="fr">

<head>
    <link rel="stylesheet" href="assets/css/style.css">
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>

<body>
    <nav class="navbar">
        <a href="#" class="logo">StageForMe</a>
        <div class="nav-links">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="recherche-entreprise.html">Recherche</a></li>
                <li><a href="mentions-legales.html">Mentions légales</a></li>
                <li class="active"><a href="dashboard.html">Pilote</a></li>
            </ul>
        </div>
        <img src="assets/images/menu-btn.png" alt="menu hamburger" class="menu-hamburger">
    </nav>
    <main id="main">
        <section class="board-head">
        <h1>Dashboard</h1>
        <p class="muted">conçu pour simplifier votre expérience.</p>
        </section>
        <section class="card side-board form-card" aria-label="Formulaire de création de compte">
            <a href="dashboard.html"><div class="nav-links">
                <img src="assets/images/stats-icon.png" alt="dashboard icon" class="stats-icon">
            </div></a>
            <a href="dashboard-1.html"><div class="nav-links">
                <img src="assets/images/profile-icon.png" alt="dashboard icon" class="profile-icon">
            </div></a>
        </section>
        <section class="card board form-card scroll">
            <div class="card-info">
                <div class="card-info title">
                    <span>CPIA1</span>
                </div>
                <div class="stat">
                    <div class="stat-icon blue">
                        <img src="assets/images/up-arrow.png" alt="up arrow">
                    </div>
                    <div>
                        <div class="stat-value">1,234</div>
                        <div class="stat-label">+8.2% le mois dernier</div>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-placeholder">
                        <div class="bars">
                            <div class="bar b1"></div>
                            <div class="bar b2"></div>
                            <div class="bar b3"></div>
                            <div class="bar b4"></div>
                            <div class="bar b5"></div>
                            <div class="bar b6"></div>
                            <div class="bar b7"></div>
                            <div class="bar b8"></div>
                        </div>
                    </div>
                </div>
                <div class="stats-bottom">

                    <div class="mini-stat">
                        <div class="mini-value green">+253</div>
                        <div class="mini-label">Nouveaux</div>
                    </div>
                
                    <div class="mini-stat">
                        <div class="mini-value blue">472</div>
                        <div class="mini-label">Actifs</div>
                    </div>
                
                    <div class="mini-stat">
                        <div class="mini-value red">32k €</div>
                        <div class="mini-label">Total</div>
                    </div>
                
                </div>
            </div>
            <div class="card-info">
                <div class="card-info title">
                    <span>CPIA2 Info</span>
                </div>
                <div class="stat">
                    <div class="stat-icon red">
                        <img src="assets/images/up-arrow.png" alt="up arrow">
                    </div>
                    <div>
                        <div class="stat-value">1,234</div>
                        <div class="stat-label">+8.2% le mois dernier</div>
                    </div>
                </div>
                <div class="chart-container">
                    <div class="chart-placeholder">
                        <div class="bars">
                            <div class="bar b1"></div>
                            <div class="bar b2"></div>
                            <div class="bar b3"></div>
                            <div class="bar b4"></div>
                            <div class="bar b5"></div>
                            <div class="bar b6"></div>
                            <div class="bar b7"></div>
                            <div class="bar b8"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
  <section class="board-footer">
    <span>© StageForMe</span>
    <a class="link" href="mentions-legales.html">Mentions légales</a>
  </section>
<script src="assets/js/menu.js"></script>
</body>
</html>
